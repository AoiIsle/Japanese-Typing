<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>日语打字道场 - N2完全版</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Noto Sans JP', 'Poppins', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 25px 35px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.2);
            width: 950px;
            max-width: 100%;
        }

        h1 {
            text-align: center;
            color: #fff;
            margin: 0 0 5px;
            font-size: 1.8rem;
        }

        .sub {
            text-align: center;
            color: #aaa;
            margin-bottom: 20px;
            font-size: 0.8rem;
        }

        .control-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
        }

        .level-dropdown {
            position: relative;
            display: inline-block;
        }

        .level-main-btn {
            background: #facc15;
            color: #0f172a;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .level-main-btn:hover {
            background: #eab308;
            transform: scale(0.97);
        }

        .level-dropdown-content {
            display: none;
            position: absolute;
            background: #1e293b;
            min-width: 100px;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            z-index: 1;
            margin-top: 5px;
            overflow: hidden;
        }

        .level-dropdown-content button {
            display: block;
            width: 100%;
            background: none;
            border: none;
            padding: 10px 20px;
            text-align: left;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .level-dropdown-content button:hover {
            background: #334155;
        }

        .level-dropdown-content button.active-level {
            background: #facc15;
            color: #0f172a;
        }

        .level-dropdown:hover .level-dropdown-content {
            display: block;
        }

        .game-config {
            background: #0f172a;
            padding: 8px 15px;
            border-radius: 40px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .game-config label {
            color: #94a3b8;
            font-size: 0.85rem;
        }

        #questionCount {
            background: #1e293b;
            border: 1px solid #475569;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            width: 60px;
            text-align: center;
        }

        .game-control-buttons {
            display: flex;
            gap: 10px;
        }

        .control-btn {
            background: #facc15;
            color: #0f172a;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .control-btn:hover {
            background: #eab308;
            transform: scale(0.97);
        }

        .reset-btn {
            background: #475569;
            color: white;
        }

        .reset-btn:hover {
            background: #334155;
        }

        .mode-indicator {
            background: #0f172a;
            border-radius: 30px;
            padding: 6px 15px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 0.85rem;
        }

        .mode-normal { color: #4ade80; }
        .mode-review { color: #facc15; }
        .mode-wrongbank { color: #f97316; }

        .japanese-card {
            background: #0f172a;
            border-radius: 32px;
            padding: 35px 20px;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5), 0 10px 20px rgba(0,0,0,0.2);
            border: 1px solid #334155;
        }

        .jp-word {
            font-size: 4rem;
            font-weight: 700;
            color: #facc15;
            text-shadow: 0 4px 10px rgba(250,204,21,0.3);
            letter-spacing: 4px;
            word-break: break-word;
        }

        .hint-area {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 25px;
            align-items: center;
            flex-wrap: wrap;
        }

        .hint-item {
            background: #1e293b;
            border-radius: 40px;
            padding: 8px 18px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .hint-content {
            font-size: 1rem;
            font-weight: bold;
            color: #facc15;
            min-width: 100px;
            transition: all 0.2s;
        }

        .hint-content.blurred {
            filter: blur(5px);
            opacity: 0.5;
        }

        .teddy-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            font-size: 2rem;
            padding: 0;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .teddy-btn:hover {
            transform: scale(1.1);
        }

        .teddy-icon {
            font-size: 2rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .input-area {
            background: #1e293b;
            border-radius: 60px;
            padding: 5px 20px;
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            border: 1px solid #475569;
            gap: 15px;
        }

        .input-area:focus-within {
            border-color: #facc15;
            box-shadow: 0 0 0 3px rgba(250,204,21,0.3);
        }

        #userInput {
            flex: 1;
            background: transparent;
            border: none;
            padding: 18px 0;
            font-size: 1.6rem;
            font-family: 'Courier New', monospace;
            font-weight: 600;
            color: #f1f5f9;
            outline: none;
        }

        .submit-btn {
            background: #facc15;
            color: #0f172a;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }

        .submit-btn:hover {
            background: #eab308;
            transform: scale(0.97);
        }

        .progress-feedback {
            background: #0f172a;
            border-radius: 40px;
            padding: 12px 20px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .match-status {
            color: #cbd5e1;
        }

        .error-detail {
            color: #f87171;
            font-size: 0.85rem;
        }

        .prefix-hint {
            color: #94a3b8;
            font-size: 0.8rem;
            font-family: monospace;
            margin-top: -10px;
            margin-bottom: 15px;
        }

        .prefix-hint.correct { color: #4ade80; }
        .prefix-hint.wrong { color: #f87171; }

        .stats {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: #0f172a;
            flex: 1;
            text-align: center;
            padding: 12px 8px;
            border-radius: 28px;
            min-width: 80px;
        }

        .stat-label {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .stat-value.correct { color: #4ade80; }
        .stat-value.wrong { color: #f87171; }
        .stat-value.progress { color: #facc15; }
        .stat-value.round { color: #f97316; }
        .stat-value.score { color: #38bdf8; }

        .library-progress {
            background: #0f172a;
            border-radius: 30px;
            padding: 10px 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .progress-text {
            color: #94a3b8;
            font-size: 0.85rem;
        }

        .progress-bar-bg {
            flex: 1;
            height: 8px;
            background: #334155;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: #facc15;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        button {
            background: #334155;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        button:hover {
            background: #475569;
            transform: scale(0.97);
        }

        .word-banks {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .bank-panel {
            flex: 1;
            background: #0f172a;
            border-radius: 20px;
            padding: 12px;
            max-height: 250px;
            overflow-y: auto;
        }

        .bank-title {
            font-weight: bold;
            color: #facc15;
            margin-bottom: 8px;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .bank-list {
            font-size: 0.8rem;
            color: #cbd5e1;
        }

        .bank-item {
            padding: 4px 6px;
            border-bottom: 1px solid #334155;
            cursor: pointer;
        }

        .bank-item:hover {
            background: #1e293b;
        }

        .remove-btn {
            background: none;
            border: none;
            color: #f87171;
            cursor: pointer;
            margin-left: 8px;
            font-size: 0.7rem;
            padding: 0 4px;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #5b6e8c;
            margin-top: 15px;
        }

        @media (max-width: 700px) {
            .game-container { padding: 20px; }
            .jp-word { font-size: 2.5rem; }
            .stat-value { font-size: 1.2rem; }
            .control-btn, .level-main-btn { padding: 6px 12px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<div class="game-container">
    <h1>🐕‍🦺 日语打字道场 · N2完全版</h1>
    <div class="sub">基于《N2汉字/词汇 考前对策》| 三轮复习机制</div>

    <div class="control-bar">
        <div class="level-dropdown">
            <button class="level-main-btn" id="levelMainBtn">📖 N2词库 ▼</button>
            <div class="level-dropdown-content" id="levelDropdown">
                <button data-level="N5">N5 (待添加)</button>
                <button data-level="N4">N4 (待添加)</button>
                <button data-level="N3">N3 (待添加)</button>
                <button data-level="N2" class="active-level">N2 (已加载)</button>
                <button data-level="N1">N1 (待添加)</button>
            </div>
        </div>
        <div class="game-config">
            <label>📝 本轮题数:</label>
            <input type="number" id="questionCount" value="10" min="1" max="50">
        </div>
        <div class="game-control-buttons">
            <button class="control-btn" id="startPauseBtn">▶ 开始游戏</button>
            <button class="control-btn reset-btn" id="resetGameBtn">🔄 重置</button>
        </div>
    </div>

    <div class="mode-indicator">
        <span>⚡ 模式: </span><span id="modeText" class="mode-normal">未开始</span>
        <span id="roundInfo" style="margin-left: 15px;"></span>
    </div>

    <div class="japanese-card">
        <div class="jp-word" id="jpWord">日本語</div>
        <div class="hint-area">
            <div class="hint-item">
                <button class="teddy-btn" id="romajiTeddyBtn" title="咖啡泰迪 - 罗马音提示">
                    <span class="teddy-icon">🐕‍🦺</span>
                    <span style="font-size:0.8rem;">罗马音</span>
                </button>
                <div class="hint-content blurred" id="romajiHint">nihongo</div>
            </div>
            <div class="hint-item">
                <button class="teddy-btn" id="kanaTeddyBtn" title="灰白泰迪 - 假名读音">
                    <span class="teddy-icon">🐩</span>
                    <span style="font-size:0.8rem;">假名读</span>
                </button>
                <div class="hint-content blurred" id="kanaHint">にほんご</div>
            </div>
        </div>
    </div>

    <div class="input-area">
        <span style="color:#94a3b8">⌨️ 输入罗马音:</span>
        <input type="text" id="userInput" placeholder="例: nihongo" autocomplete="off">
        <button class="submit-btn" id="submitBtn">↵ 提交</button>
    </div>

    <div class="progress-feedback">
        <div class="match-status" id="matchStatus">✨ 点击开始游戏</div>
        <div class="error-detail" id="errorDetail"></div>
    </div>
    <div class="prefix-hint" id="prefixHint">💡 输入罗马音后，这里会显示前缀匹配情况</div>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-label">✅ 本轮正确</div>
            <div class="stat-value correct" id="correctCount">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">❌ 本轮错误</div>
            <div class="stat-value wrong" id="wrongCount">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">📊 进度</div>
            <div class="stat-value progress" id="progressCount">0/<span id="totalQ">0</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-label">🔄 复习轮次</div>
            <div class="stat-value round" id="roundNum">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">⭐ 得分</div>
            <div class="stat-value score" id="scoreValue">0</div>
        </div>
    </div>

    <div class="library-progress">
        <span class="progress-text" id="testedCount">📖 已测试: 0词</span>
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
        <span class="progress-text" id="remainingCount">📚 剩余: 0词</span>
    </div>

    <div class="button-group">
        <button id="addToFavoriteBtn">⭐ 收藏当前词</button>
        <button id="clearFavoritesBtn">🗑️ 清空收藏</button>
        <button id="reviewWrongBankBtn" style="background:#f97316">📕 复习错题本</button>
    </div>

    <div class="word-banks">
        <div class="bank-panel">
            <div class="bank-title">📕 错题本 (三轮后仍未掌握的)</div>
            <div class="bank-list" id="wrongList"></div>
        </div>
        <div class="bank-panel">
            <div class="bank-title">⭐ 收藏本</div>
            <div class="bank-list" id="favoriteList"></div>
        </div>
    </div>
    <footer>🐕 咖啡泰迪=罗马音 | 🐩 灰白泰迪=假名读音 | 完成整轮后才复习错词 | 连续三轮错误的词进入错题本</footer>
</div>
